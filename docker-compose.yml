services:
  database:
    image: mysql:8.0
    container_name: inventory_db
    environment:
      MYSQL_ROOT_PASSWORD: Password_1234
      MYSQL_DATABASE: InventoryManagementDb
      MYSQL_USER: inventory
      MYSQL_PASSWORD: Password_1234
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventory_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory_api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - "ConnectionStrings__DefaultConnection=Server=database;Port=3306;Database=InventoryManagementDb;User=inventory;Password=Password_1234;SslMode=None;"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - inventory_network

  ui:
    build:
      context: ./InventoryManagement.UI
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:5000/api/v1
    container_name: inventory_ui
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - inventory_network

networks:
  inventory_network:
    driver: bridge
